version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: domain-abuse-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: domain-abuse-db
    networks:
      - domain-abuse-network

  redis:
    image: redis:alpine
    container_name: domain-abuse-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - domain-abuse-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: domain-abuse-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
      - redis
    environment:
      PORT: 3000
      NODE_ENV: development
      MONGODB_URI: mongodb://mongodb:27017/domain-abuse-db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:5173
      PUPPETEER_HEADLESS: "false"
      PUPPETEER_TIMEOUT: 60000
    volumes:
      - ./backend/src:/app/src
      - /app/node_modules
    networks:
      - domain-abuse-network

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  domain-abuse-network:
    driver: bridge
